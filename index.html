<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Flask session cookie decoder, encoder and secret key cracker. CTF tool for pentesters.">
<meta name="keywords" content="flask cookie decoder, flask session cookie, flask secret key cracker, CTF tool, pentest, flask encode cookie, flask secret bruteforce">
<title>FlaskForge</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script data-goatcounter="https://razvanttn.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <span class="site-name">FlaskForge</span>
      <span class="site-sub">flask session cookie tool</span>
    </div>
    <a class="gh-link" href="https://github.com/razvanttn" target="_blank">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg> 

      razvanttn
    </a>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="sw('decode')">decode</button>
    <button class="tab" onclick="sw('encode')">encode</button>
    <button class="tab" onclick="sw('verify')">verify</button>
    <button class="tab" onclick="sw('crack')">crack token</button>
  </div>

  <!-- DECODE -->
  <div class="panel active" id="panel-decode">
    <div>
      <label>session cookie</label>
      <textarea id="dec-in" placeholder="eyJ1c2VybmFtZSI6ImFkbWluIn0.ZxYt2A.abc123..."></textarea>
    </div>
    <div class="row">
      <button class="btn btn-p" onclick="doDecode()">decode</button>
      <button class="btn btn-s" onclick="clr('dec-in','dec-out')">clear</button>
    </div>
    <div class="out" id="dec-out">
      <div class="parts" id="dec-parts"></div>
    </div>
  </div>

  <!-- ENCODE -->
  <div class="panel" id="panel-encode">
    <div>
      <label>json payload</label>
      <textarea id="enc-payload" placeholder='{"username": "admin", "role": "user"}'></textarea>
    </div>
    <div>
      <label>secret_key</label>
      <div class="key-wrap">
        <input type="password" id="enc-key" placeholder="your Flask SECRET_KEY">
        <button class="vis-btn" onclick="vis('enc-key',this)">show</button>
      </div>
    </div>
    <div>
      <label>format</label>
      <div class="radio-g" style="flex-direction:row;gap:16px">
        <label class="radio-l">
          <input type="radio" name="enc-fmt" value="plain" checked>
          plain (legacy)
        </label>
        <label class="radio-l">
          <input type="radio" name="enc-fmt" value="compressed">
          compressed (itsdangerous)
        </label>
      </div>
    </div>
    <div class="row">
      <button class="btn btn-p" onclick="doEncode()">generate</button>
      <button class="btn btn-s" onclick="clrEnc()">clear</button>
    </div>
    <div class="out" id="enc-out">
      <div class="out-hdr">
        <span>cookie</span>
        <button class="cp" id="cp-enc" onclick="cp('enc-box','cp-enc')">copy</button>
      </div>
      <div class="box ok" id="enc-box"></div>
    </div>
  </div>

  <!-- VERIFY -->
  <div class="panel" id="panel-verify">
    <div>
      <label>session cookie</label>
      <textarea id="ver-cookie" placeholder="paste cookie..."></textarea>
    </div>
    <div>
      <label>secret_key</label>
      <div class="key-wrap">
        <input type="password" id="ver-key" placeholder="SECRET_KEY to test">
        <button class="vis-btn" onclick="vis('ver-key',this)">show</button>
      </div>
    </div>
    <div class="row">
      <button class="btn btn-p" onclick="doVerify()">verify</button>
      <button class="btn btn-s" onclick="clrVer()">clear</button>
    </div>
    <div class="out" id="ver-out">
      <div id="ver-status"></div>
      <div class="parts" id="ver-parts" style="margin-top:8px"></div>
    </div>
  </div>

  <!-- CRACK -->
  <div class="panel" id="panel-crack">
    <div>
      <label>session cookie</label>
      <textarea id="bf-cookie" placeholder="paste cookie to crack..."></textarea>
    </div>
    <div>
      <label>wordlist</label>
      <div class="radio-g">
        <label class="radio-l">
          <input type="radio" name="bf-src" value="builtin" checked onchange="togWl()">
          <span id="bf-wl-label">built-in wordlist (loading...)</span>
        </label>
        <label class="radio-l">
          <input type="radio" name="bf-src" value="upload" onchange="togWl()">
          upload custom wordlist (.txt)
        </label>
      </div>
      <div id="bf-upload" style="display:none;margin-top:8px">
        <input type="file" id="bf-file" accept=".txt" onchange="loadWl(this)" style="display:none">
        <button class="btn btn-s" onclick="document.getElementById('bf-file').click()">choose file</button>
        <span id="bf-file-lbl" style="color:var(--muted);font-size:11px;margin-left:8px">no file chosen</span>
      </div>
    </div>
    <div class="row">
      <button class="btn btn-p" id="bf-start" onclick="startBf()">start</button>
      <button class="btn btn-s" id="bf-stop" onclick="stopBf()" style="display:none">stop</button>
      <button class="btn btn-s" onclick="clrBf()">clear</button>
    </div>
    <div class="prog-wrap" id="bf-prog">
      <div class="prog-meta">
        <span id="bf-prog-lbl">0 / 0</span>
        <span id="bf-speed"></span>
      </div>
      <div class="prog-track"><div id="bf-bar"></div></div>
    </div>
    <div class="out" id="bf-out" style="margin-top:4px">
      <div id="bf-status"></div>
      <div class="parts" id="bf-found" style="margin-top:8px"></div>
    </div>
  </div>

  <footer>
    <span>made by <strong style="color:var(--text)">k0d</strong></span>
    <div class="footer-r">
      <a href="https://razvanttn.gitbook.io/ctf" target="_blank">writeups</a>
      <span style="color:var(--border)">·</span>
      <span>discord: razvanttn_</span>
    </div>
  </footer>

</div>
<script src="assets/script.js"></script>
</body>
</html>
